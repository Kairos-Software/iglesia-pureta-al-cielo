{% load static %}
<div class="chat-container">
    <div class="chat-header">
        <div class="chat-header-title">
            <span class="material-symbols-outlined">forum</span>
            <span>Chat en Vivo</span>
        </div>
        <div class="chat-online-indicator">
            <span class="online-dot"></span>
            <span class="online-count" id="onlineCount">0</span>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        {% if not on_air %}
        <div class="chat-msg system">
            <span class="material-symbols-outlined">info</span>
            El chat está desactivado
        </div>
        {% else %}
        <div class="chat-msg system">
            <span class="material-symbols-outlined">waving_hand</span>
            ¡Bienvenido al chat!
        </div>
        {% endif %}
    </div>

    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" 
               placeholder="Escribe un mensaje..." {% if not on_air %}disabled{% endif %}>
        <button class="chat-send-btn" id="chatSendBtn" {% if not on_air %}disabled{% endif %}>
            <span class="material-symbols-outlined">send</span>
        </button>
    </div>
</div>
