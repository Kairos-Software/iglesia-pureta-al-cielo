{% load static %}
<!DOCTYPE html>
<html lang="es" data-template="{{ site_config.template|default:'kaircam' }}">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{{ site_config.org_name|default:"Mi Organización" }}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon dinámico (logo de la organización) -->
    <link rel="icon" type="image/png" href="{% if site_config.logo_url %}{{ site_config.logo_url }}{% else %}{% static 'core/img/logo.png' %}{% endif %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=Nunito:wght@300;400;500;600;700&family=Lato:wght@300;400;700&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'core/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/templates/' %}{{ site_config.template|default:'kaircam' }}.css">

    <style id="siteThemeVars">:root {
{% if site_config.color_bg_primary %}        --bg: {{ site_config.color_bg_primary }};
        --bg2: {{ site_config.color_bg_primary }};
        --bg3: {{ site_config.color_bg_primary }};
        --card: {{ site_config.color_bg_primary }};
{% endif %}{% if site_config.color_accent %}        --accent: {{ site_config.color_accent }};
        --accent2: {{ site_config.color_accent }};
        --accent-glow: {{ site_config.color_accent }}2e;
{% endif %}{% if site_config.color_text %}        --text: {{ site_config.color_text }};
        --text-muted: {{ site_config.color_text }};
{% endif %}{% if site_config.font_display %}        --font-display: '{{ site_config.font_display }}', Georgia, serif;
{% endif %}{% if site_config.font_body %}        --font-body: '{{ site_config.font_body }}', system-ui, sans-serif;
{% endif %}    }</style>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script src="{% static 'core/js/base.js' %}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
